<!DOCTYPE html>
<html lang="pt-BR" data-theme="light" data-accent="lavanda">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grimlist</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%23fdfaf7'/%3E%3Ccircle cx='28' cy='30' r='10' fill='%23f1eaf8' stroke='%238b6fb8' stroke-width='3'/%3E%3Cg stroke='%238b6fb8' stroke-width='3' stroke-linecap='round'%3E%3Cpath d='M28 9v7M28 44v7M7 30h7M42 30h7M13 15l5 5M38 40l5 5M43 15l-5 5M18 40l-5 5'/%3E%3C/g%3E%3Cpath d='M43 17c-7 2-12 8-12 16s5 14 12 16c-10 2-20-6-20-16s10-18 20-16Z' fill='%23fdfaf7' stroke='%236b4f96' stroke-width='3' stroke-linejoin='round'/%3E%3Cpath d='M48 12h4M50 10v4M15 48h4M17 46v4' stroke='%23d9789f' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;0,700;1,500&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --font-display:'Fraunces', Georgia, 'Times New Roman', serif;
  --font-body:'Nunito', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;

  --radius:14px;
  --radius-sm:9px;
  --radius-pill:999px;

  --accent:#8b6fb8;
  --accent-strong:#6b4f96;

  --bg-page:#fdfaf7;
  --bg-sidebar:#ffffff;
  --bg-card:#ffffff;
  --bg-subtle:#faf6fb;
  --bg-input:#ffffff;
  --hover:#f5eff9;
  --border:#eee6f4;
  --border-strong:#e2d6ee;
  --text:#3d3646;
  --text-secondary:#8a8394;
  --text-tertiary:#b7b0c2;
  --shadow:0 3px 14px rgba(120,90,150,0.10), 0 1px 3px rgba(120,90,150,0.06);
  --overlay:rgba(45,35,55,.45);

  --success:#5fa583;
  --danger:#c96b7c;

  --accent-soft:#f1eaf8;
  --accent-soft-text:#6b4f96;
  --grad-a:#f3e6fb;
  --grad-b:#fbe3ec;

  --blue-bg:#e9f2fa; --blue-text:#3f7aa8;
  --purple-bg:#f2eafb; --purple-text:#7c5aa8;
  --orange-bg:#fcedde; --orange-text:#c17a3d;
  --pink-bg:#fceef4; --pink-text:#c15c8c;
  --green-bg:#e9f5ee; --green-text:#4c9270;
  --gray-bg:#f2eff5; --gray-text:#948d9e;
  --red-bg:#fbe9ec; --red-text:#c85f6f;
  --yellow-bg:#fdf6dd; --yellow-text:#ab8a2b;
}

html[data-theme="dark"]{
  --bg-page:#211d29;
  --bg-sidebar:#1a1720;
  --bg-card:#2a2532;
  --bg-subtle:#272230;
  --bg-input:#2a2532;
  --hover:#342d3e;
  --border:#3a3344;
  --border-strong:#463e51;
  --text:#f1ecf7;
  --text-secondary:#b6adc4;
  --text-tertiary:#867d95;
  --shadow:0 4px 18px rgba(0,0,0,0.35);
  --overlay:rgba(10,8,14,.6);

  --success:#5fb389;
  --danger:#e0879a;

  --blue-bg:#243040; --blue-text:#8ec3ea;
  --purple-bg:#332a42; --purple-text:#cbaee8;
  --orange-bg:#3c3025; --orange-text:#e8b57e;
  --pink-bg:#3a2732; --pink-text:#eba9c6;
  --green-bg:#233229; --green-text:#93d3ae;
  --gray-bg:#332e3b; --gray-text:#b0a8bd;
  --red-bg:#3a2429; --red-text:#eb98a6;
  --yellow-bg:#39311c; --yellow-text:#e0c063;
}

html[data-theme="light"][data-accent="lavanda"]{ --accent:#8b6fb8; --accent-strong:#6b4f96; --accent-soft:#f1eaf8; --accent-soft-text:#6b4f96; --grad-a:#f3e6fb; --grad-b:#fbe3ec; }
html[data-theme="light"][data-accent="rosa"]{ --accent:#d9789f; --accent-strong:#b1547c; --accent-soft:#fbe9ef; --accent-soft-text:#a44870; --grad-a:#fbd9e3; --grad-b:#ffe8d9; }
html[data-theme="light"][data-accent="menta"]{ --accent:#4f9e88; --accent-strong:#357a63; --accent-soft:#e4f3ee; --accent-soft-text:#2f7a64; --grad-a:#d9f0e6; --grad-b:#eaf5ee; }
html[data-theme="light"][data-accent="pessego"]{ --accent:#d98c4a; --accent-strong:#b3691f; --accent-soft:#faedde; --accent-soft-text:#a3601c; --grad-a:#fbe4cd; --grad-b:#fbd9d0; }
html[data-theme="light"][data-accent="ceu"]{ --accent:#5c8fc4; --accent-strong:#3d6690; --accent-soft:#e7f0fa; --accent-soft-text:#34618f; --grad-a:#dce9f8; --grad-b:#e6eefb; }

html[data-theme="dark"][data-accent="lavanda"]{ --accent:#a58bd0; --accent-strong:#8b6fb8; --accent-soft:#3a2f4d; --accent-soft-text:#cbb3ea; --grad-a:#332a42; --grad-b:#3d2b39; }
html[data-theme="dark"][data-accent="rosa"]{ --accent:#e298b4; --accent-strong:#d9789f; --accent-soft:#4a2c38; --accent-soft-text:#f0b9cf; --grad-a:#412a34; --grad-b:#3c2d27; }
html[data-theme="dark"][data-accent="menta"]{ --accent:#6bbaa4; --accent-strong:#4f9e88; --accent-soft:#223f38; --accent-soft-text:#9fe0cb; --grad-a:#1f342e; --grad-b:#243a34; }
html[data-theme="dark"][data-accent="pessego"]{ --accent:#e2a367; --accent-strong:#d98c4a; --accent-soft:#453322; --accent-soft-text:#f0c090; --grad-a:#3b2d20; --grad-b:#392923; }
html[data-theme="dark"][data-accent="ceu"]{ --accent:#7ea8d6; --accent-strong:#5c8fc4; --accent-soft:#253a4d; --accent-soft-text:#a9cdf0; --grad-a:#20303f; --grad-b:#242f3c; }

*{box-sizing:border-box;}
html,body{height:100%;}
body{margin:0;font-family:var(--font-body);color:var(--text);background:var(--bg-page);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;transition:background .25s ease,color .25s ease;}
button, select, input, textarea{font-family:inherit;}
a{color:inherit;}

.mobile-bar{display:none;}
.bottom-nav{display:none;}

#app{display:flex;height:100vh;overflow:hidden;}
#sidebar{width:250px;flex-shrink:0;background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px 10px;overflow-y:auto;transition:background .25s ease,border-color .25s ease;}
.brand-mark{display:flex;align-items:center;gap:10px;color:var(--text);}
.sidebar-title{padding:6px 10px 14px;}
.brand-icon{width:34px;height:34px;flex-shrink:0;color:var(--accent-strong);}
.brand-word{font-family:var(--font-display);font-size:19px;font-weight:700;letter-spacing:.01em;line-height:1;}
.brand-sub{font-size:9px;text-transform:uppercase;letter-spacing:.18em;color:var(--text-tertiary);font-weight:900;margin-top:4px;}
.brand-stars{color:var(--accent);opacity:.7;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:10px;cursor:pointer;color:var(--text);font-size:14px;font-weight:600;user-select:none;transition:background .15s ease,color .15s ease;}
.nav-item:hover{background:var(--hover);}
.nav-item.active{background:var(--accent-soft);color:var(--accent-soft-text);font-weight:800;}
.nav-emoji{font-size:15px;width:18px;text-align:center;flex-shrink:0;}
.sidebar-footer{margin-top:auto;padding:14px 10px 4px;font-size:11px;color:var(--text-tertiary);border-top:1px solid var(--border);}
.footer-flourish{display:block;opacity:.55;margin-bottom:6px;}
.footer-flourish path{stroke:var(--accent);fill:none;}
.footer-flourish circle{fill:var(--accent);}
.theme-switcher{margin-bottom:10px;display:flex;flex-direction:column;align-items:center;}
.theme-toggle-row{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:9px;width:100%;}
.theme-mode-btn{flex:1;display:flex;align-items:center;justify-content:center;padding:6px 4px;border-radius:var(--radius-sm);border:1.5px solid var(--border-strong);background:var(--bg-card);cursor:pointer;font-size:13px;color:var(--text-secondary);transition:all .15s ease;}
.theme-mode-btn.active{background:var(--accent-soft);color:var(--accent-soft-text);border-color:var(--accent);}
.swatch-row{display:flex;justify-content:center;gap:7px;padding:0 2px;width:100%;}
.swatch{width:19px;height:19px;border-radius:50%;cursor:pointer;border:2px solid transparent;box-shadow:0 0 0 1px var(--border-strong) inset;transition:transform .15s ease;}
.swatch:hover{transform:scale(1.12);}
.swatch.sel{border-color:var(--bg-card);box-shadow:0 0 0 2px var(--bg-card),0 0 0 3.5px var(--accent);}

#content{flex:1;overflow-y:auto;padding:56px clamp(44px,5vw,96px);max-width:none;width:100%;}
@media (max-width:880px){#content{padding:32px;max-width:100%;}}

.page-header{display:flex;align-items:center;gap:12px;margin-bottom:26px;}
.page-emoji{font-size:32px;}
.page-title{font-family:var(--font-display);font-size:42px;line-height:1;font-weight:600;margin:0;letter-spacing:0;}

.callout{display:flex;gap:12px;background:linear-gradient(135deg,var(--grad-a),var(--grad-b));border-radius:18px;padding:18px 20px;margin-bottom:30px;box-shadow:var(--shadow);}
.callout-icon{font-size:19px;}
.callout-label{font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--accent-strong);font-weight:800;margin-bottom:6px;font-family:var(--font-body);}
.callout-text{outline:none;font-size:17px;font-weight:500;min-height:24px;font-family:var(--font-display);font-style:italic;color:var(--text);}
.callout-text:empty:before{content:attr(data-placeholder);color:var(--text-tertiary);font-weight:400;}

.section-label{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:800;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.03em;margin:30px 0 8px;}
.section-label .count{background:var(--accent-soft);color:var(--accent-soft-text);border-radius:10px;padding:1px 7px;font-size:11px;font-weight:700;}

.task-list{display:flex;flex-direction:column;border-top:1px solid var(--border);}
.task-row{display:flex;align-items:center;gap:10px;padding:10px 8px;border-bottom:1px solid var(--border);cursor:pointer;border-radius:8px;}
.task-row:hover{background:var(--hover);}
.task-row.done .task-name{color:var(--text-tertiary);text-decoration:line-through;}
.chk{width:17px;height:17px;border-radius:6px;border:1.5px solid var(--border-strong);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--bg-input);font-size:11px;color:#fff;}
.chk.checked{background:var(--success);border-color:var(--success);}
.task-name{flex:1;font-size:14px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot.urgente{background:var(--danger);}
.dot.normal{background:var(--text-tertiary);}
.dot.quandoder{background:var(--border-strong);}
.task-date{font-size:12px;color:var(--text-tertiary);white-space:nowrap;flex-shrink:0;font-weight:600;}
.tag{font-size:11.5px;padding:3px 10px;border-radius:var(--radius-pill);font-weight:700;white-space:nowrap;flex-shrink:0;}
.tag-blue{background:var(--blue-bg);color:var(--blue-text);}
.tag-purple{background:var(--purple-bg);color:var(--purple-text);}
.tag-orange{background:var(--orange-bg);color:var(--orange-text);}
.tag-pink{background:var(--pink-bg);color:var(--pink-text);}
.tag-green{background:var(--green-bg);color:var(--green-text);}
.tag-gray{background:var(--gray-bg);color:var(--gray-text);}
.tag-red{background:var(--red-bg);color:var(--red-text);}
.tag-yellow{background:var(--yellow-bg);color:var(--yellow-text);}

.toggle{margin-top:10px;}
.toggle-head{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12.5px;font-weight:800;color:var(--text-secondary);padding:6px;text-transform:uppercase;letter-spacing:.03em;}
.toggle-arrow{transition:transform .15s;font-size:10px;display:inline-block;color:var(--accent);}
.toggle.open .toggle-arrow{transform:rotate(90deg);}
.toggle-body{display:none;padding-left:2px;}
.toggle.open .toggle-body{display:block;}

.btn{display:inline-flex;align-items:center;gap:6px;background:var(--bg-card);border:1.5px solid var(--border-strong);border-radius:var(--radius-sm);padding:8px 14px;font-size:13px;font-weight:700;color:var(--text);cursor:pointer;transition:all .15s ease;}
.btn:hover{background:var(--hover);border-color:var(--accent);}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-strong));color:#fff;border-color:transparent;box-shadow:0 3px 10px rgba(120,90,150,.25);}
.btn-primary:hover{filter:brightness(1.06);}
.btn-danger{color:var(--danger);}
.btn-row{margin-top:16px;display:flex;gap:8px;}
.btn-return-project{margin-bottom:14px;background:var(--accent-soft);border-color:var(--accent);color:var(--accent-soft-text);}
.btn-return-project:hover{background:var(--hover);border-color:var(--accent-strong);}

.board{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;align-items:flex-start;padding-bottom:14px;}
.board-col{min-width:0;background:var(--bg-subtle);border-radius:16px;padding:12px;}
.board-col.drag-over{outline:1.5px dashed var(--accent);outline-offset:-6px;background:var(--hover);}
.board-col-head{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;font-weight:800;color:var(--text-secondary);padding:4px 6px 10px;text-transform:uppercase;letter-spacing:.02em;}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:12px 14px;margin-bottom:9px;cursor:pointer;box-shadow:var(--shadow);transition:border-color .15s ease,transform .15s ease;}
.card.drag-enabled{cursor:grab;}
.card.drag-enabled:active{cursor:grabbing;}
.card:hover{border-color:var(--accent);transform:translateY(-1px);}
.card-title{font-size:13.5px;font-weight:700;margin-bottom:8px;}
.card-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.card-sub{font-size:11px;color:var(--text-tertiary);margin-top:8px;font-weight:600;}
.area-projects-panel{margin-top:18px;background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:14px;}
.area-projects-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin-top:10px;}
.area-project-card{border:1px solid var(--border);background:var(--bg-subtle);border-radius:10px;padding:12px;cursor:pointer;display:flex;justify-content:space-between;gap:12px;align-items:flex-start;transition:border-color .15s ease,transform .15s ease;}
.area-project-card:hover{border-color:var(--accent);transform:translateY(-1px);}
.area-project-title{font-family:var(--font-display);font-size:17px;color:var(--text);line-height:1.2;font-weight:700;}
.area-project-next{font-size:12px;color:var(--text-secondary);font-weight:700;line-height:1.35;margin-top:5px;}
.area-project-meta{display:flex;flex-direction:column;align-items:flex-end;gap:6px;font-size:11px;color:var(--text-secondary);font-weight:800;white-space:nowrap;}
.marketing-page{max-width:min(100%,1460px);margin:0 auto;padding-bottom:46px;}
.marketing-header{display:flex;align-items:center;gap:18px;margin-bottom:24px;}
.marketing-page{--client-bg:var(--pink-bg);--client-text:var(--pink-text);}
.marketing-page.theme-blue{--client-bg:var(--blue-bg);--client-text:var(--blue-text);}
.marketing-icon{width:86px;height:86px;border-radius:999px;background:var(--client-bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:42px;box-shadow:0 10px 28px rgba(180,90,130,.08);}
.marketing-title{font-family:var(--font-display);font-size:46px;line-height:1;margin:0;color:var(--text);font-weight:600;letter-spacing:0;}
.marketing-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
.marketing-tag{border-radius:999px;background:var(--client-bg);color:var(--client-text);font-size:13px;font-weight:900;padding:6px 10px;}
.marketing-hero{position:relative;overflow:hidden;border:1px solid var(--border);border-radius:18px;background:var(--client-bg);padding:24px 38px;margin:16px 0 22px;display:grid;grid-template-columns:minmax(320px,1fr) repeat(3,minmax(150px,210px));gap:24px;align-items:center;}
.marketing-hero.is-compact{padding:10px 28px;grid-template-columns:minmax(160px,.55fr) repeat(3,minmax(130px,190px));gap:16px;margin:12px 0 18px;}
.marketing-hero::after{content:'✦';position:absolute;right:36px;top:28px;color:var(--client-text);font-size:34px;opacity:.35;}
.marketing-hero.is-compact::after{right:28px;top:18px;font-size:26px;}
.marketing-hero-copy{display:grid;gap:18px;}
.marketing-hero.is-compact .marketing-hero-copy{gap:0;}
.marketing-hero-title{font-family:var(--font-display);font-size:24px;line-height:1.25;color:var(--text);font-weight:700;max-width:520px;}
.marketing-hero-meta{display:flex;gap:28px;flex-wrap:wrap;color:var(--text-secondary);font-size:13px;font-weight:900;}
.marketing-hero.is-compact .marketing-hero-meta{font-size:12px;gap:12px;}
.marketing-hero-stat{border-left:1px solid var(--border);padding-left:24px;min-height:82px;display:flex;flex-direction:column;justify-content:center;}
.marketing-hero.is-compact .marketing-hero-stat{min-height:56px;padding-left:18px;}
.marketing-stat-icon{width:42px;height:42px;border-radius:999px;background:rgba(255,255,255,.58);display:flex;align-items:center;justify-content:center;color:var(--client-text);font-size:20px;margin-bottom:8px;}
.marketing-hero.is-compact .marketing-stat-icon{width:30px;height:30px;font-size:15px;margin-bottom:5px;}
.marketing-stat-label{font-size:12px;color:var(--text-secondary);font-weight:900;margin-bottom:8px;}
.marketing-hero.is-compact .marketing-stat-label{font-size:11px;margin-bottom:4px;}
.marketing-stat-num{font-family:var(--font-display);font-size:30px;color:var(--text);font-weight:700;line-height:1;}
.marketing-hero.is-compact .marketing-stat-num{font-size:24px;}
.marketing-stat-sub{font-size:12px;color:var(--text-secondary);font-weight:800;margin-top:6px;}
.marketing-hero.is-compact .marketing-stat-sub{font-size:11px;margin-top:4px;}
.marketing-hero-strip{position:relative;overflow:hidden;border:1px solid var(--border);border-radius:18px;background:var(--client-bg);padding:12px 26px;margin:12px 0 18px;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));align-items:center;}
.marketing-hero-strip::after{content:'✦';position:absolute;right:24px;top:50%;transform:translateY(-50%);color:var(--client-text);font-size:23px;opacity:.3;}
.marketing-strip-item{min-height:42px;display:flex;align-items:center;gap:12px;padding:0 20px;border-left:1px solid var(--border);}
.marketing-strip-item:first-child{border-left:0;padding-left:0;}
.marketing-strip-icon{width:34px;height:34px;border-radius:999px;background:rgba(255,255,255,.6);display:flex;align-items:center;justify-content:center;color:var(--client-text);font-size:16px;font-weight:900;flex:0 0 auto;}
.marketing-strip-copy{min-width:0;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;}
.marketing-strip-label,.marketing-strip-sub{font-size:12px;color:var(--text-secondary);font-weight:850;line-height:1.35;}
.marketing-strip-num{font-family:var(--font-body);font-size:12px;color:var(--text);font-weight:950;line-height:1.35;}
.marketing-projects{background:var(--bg-card);border:1px solid var(--border);border-radius:18px;padding:20px;margin-bottom:24px;}
.marketing-projects.compact{padding:14px 16px;margin-top:24px;}
.marketing-projects.compact .marketing-project-grid{grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px;}
.marketing-projects.compact .marketing-project-card{padding:12px;grid-template-columns:1fr auto;}
.marketing-projects.compact .marketing-project-symbol{display:none;}
.marketing-projects.compact .marketing-project-title{font-size:17px;}
.marketing-projects.compact .marketing-project-next{font-size:12px;}
.marketing-access{background:var(--bg-card);border:1px solid var(--border);border-radius:18px;padding:18px 20px;margin-bottom:24px;}
.marketing-access-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;}
.marketing-access-title{font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:var(--text-secondary);font-weight:900;}
.marketing-access textarea{width:100%;min-height:96px;border:1.5px solid var(--border-strong);border-radius:12px;background:var(--bg-input);color:var(--text);font:inherit;font-size:13px;line-height:1.5;padding:12px;resize:vertical;outline:none;}
.marketing-access textarea:focus{border-color:var(--accent);}
.marketing-project-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:16px;}

  html[data-theme="dark"] .bottom-nav{background:rgba(26,23,32,.96);}
  .bottom-nav-item{border:0;background:transparent;border-radius:12px;color:var(--text-secondary);font-size:11px;font-weight:800;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;min-height:48px;padding:4px 2px;cursor:pointer;}
  .bottom-nav-item .nav-emoji{width:auto;font-size:17px;}
  .bottom-nav-item.active{background:var(--accent-soft);color:var(--accent-soft-text);}
}

/* ---------- layout hoje ---------- */
.hoje-layout { display: grid; grid-template-columns: minmax(0, 1fr) minmax(280px, 320px); gap: clamp(22px, 3vw, 44px); align-items: flex-start; justify-content: center; width: 100%; max-width: min(100%, 1320px); margin: 0 auto; }
.hoje-main { min-width: 0; }
.hoje-sidebar { width: 300px; flex-shrink: 0; display: flex; flex-direction: column; gap: 16px; }
@media (max-width: 1100px) {
  .hoje-layout { grid-template-columns: minmax(520px, 1fr); max-width: 760px; }
  .hoje-sidebar { width: 100%; }
}
@media (max-width: 880px) { .hoje-layout { display:block; } .hoje-sidebar { width: 100%; margin-top:24px; } }

/* ---------- page header hoje ---------- */
.hoje-title-row { display: flex; align-items: center; gap: 12px; margin: 0 auto 2px; width: 100%; max-width: min(100%, 1320px); }
.hoje-star { font-size: 26px; line-height: 1; }
.hoje-subtitle { font-size: 12.5px; color: var(--text-tertiary); margin: 0 auto 28px; width: 100%; max-width: min(100%, 1320px); font-style: italic; }

/* ---------- callout resultado ---------- */
.callout-resultado { background: var(--accent-soft); border: 1px solid var(--border); border-radius: 14px; padding: 18px 22px; margin-bottom: 28px; }
.callout-resultado-label { font-size: 10.5px; font-weight: 800; letter-spacing: 1.2px; text-transform: uppercase; color: var(--accent-strong); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.callout-resultado-text { font-size: 14px; color: var(--text-secondary); font-style: italic; min-height: 22px; outline: none; }
.callout-resultado-text:empty::before { content: attr(data-placeholder); opacity: 0.5; }

/* ---------- section label hoje ---------- */
.section-label-hoje { font-size: 10.5px; font-weight: 800; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }

/* ---------- task list card ---------- */
.task-list-card { background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); padding: 0 8px; overflow: hidden; }
.task-list-card .task-row { border-radius: 0; }
.task-list-card .task-row:last-child { border-bottom: none; }

/* ---------- btn nova tarefa ---------- */
.btn-nova-tarefa { background: var(--bg-card); color: var(--accent-strong); border: 1.5px solid var(--border-strong); padding: 8px 18px; border-radius: 999px; font-size: 13.5px; font-weight: 700; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; margin-top: 14px; }
.btn-nova-tarefa:hover { background: var(--hover); border-color: var(--accent); }

/* ---------- widgets direita ---------- */
.widget { background: var(--bg-card); border-radius: 14px; border: 1px solid var(--border); padding: 18px 20px; }
.widget-title { font-size: 11px; font-weight: 800; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
.habito-row { display: flex; align-items: center; gap: 10px; padding: 9px 12px; background: var(--bg-page); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; transition: background 0.15s; }
.habito-row:hover { background: var(--hover); }
.habito-chk { width: 20px; height: 20px; border-radius: 6px; border: 1.5px solid var(--border-strong); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; background: var(--bg-input); color: transparent; transition: all 0.15s; }
.habito-chk.done { background: var(--accent-soft); border-color: var(--accent); color: var(--accent-strong); }
.habito-nome { font-size: 13.5px; font-weight: 600; color: var(--text); flex: 1; }
.habitos-list { display: flex; flex-direction: column; gap: 8px; }

/* ---------- carta do dia ---------- */
.carta-inner { display: flex; align-items: center; gap: 16px; }
.carta-img-box { width: 82px; height: 128px; border-radius: 8px; border: 1.5px solid var(--border-strong); background: linear-gradient(135deg, var(--grad-a), var(--grad-b)); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 28px; position: relative; }
.carta-img-box::after { content: ''; position: absolute; inset: 5px; border: 1px solid rgba(255,255,255,0.6); border-radius: 4px; pointer-events: none; }
.carta-info-title { font-family: var(--font-display); font-size: 17px; font-weight: 600; color: var(--text); }
.carta-info-sub { font-size: 11.5px; color: var(--text-tertiary); font-style: italic; margin-top: 4px; }

/* ---------- projetos e visualizações ---------- */
.nav-emoji{cursor:pointer;border-radius:6px;}
.nav-emoji:hover{background:var(--hover);}
.sidebar-footer{position:sticky;bottom:0;background:var(--bg-sidebar);box-shadow:0 -10px 18px var(--bg-sidebar);}
.footer-flourish{display:none;}
.today-list-head{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.view-switch{display:inline-flex;align-items:center;gap:4px;background:var(--bg-card);border:1px solid var(--border);border-radius:999px;padding:4px;margin-left:auto;}
.view-switch button{border:0;background:transparent;color:var(--text-secondary);border-radius:999px;padding:6px 10px;font-size:12px;font-weight:800;cursor:pointer;}
.view-switch button.active{background:var(--accent-soft);color:var(--accent-soft-text);}
.week-board{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,360px),1fr));gap:16px;align-items:start;padding-bottom:12px;}
.week-col{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;min-height:240px;padding:14px;box-shadow:0 8px 22px rgba(120,90,150,.035);}

.week-task{border:1px solid var(--border);border-radius:10px;padding:12px 13px;margin-bottom:10px;background:var(--bg-card);cursor:pointer;}

.projects-page{max-width:min(100%,1320px);margin:0 auto;padding-bottom:42px;}

@media (min-width:1500px){.project-gallery{grid-template-columns:repeat(5,minmax(0,1fr));}}
.project-card{--project-tone:var(--accent);--project-soft:var(--accent-soft);background:var(--bg-card);border:1px solid color-mix(in srgb, var(--project-tone) 24%, var(--border));border-radius:14px;padding:30px 18px 18px;cursor:pointer;box-shadow:0 6px 18px rgba(150,90,120,.035);transition:transform .15s ease,border-color .15s ease;position:relative;overflow:hidden;min-height:300px;}

.project-card-title{font-family:var(--font-display);font-size:19px;color:var(--text);line-height:1.16;margin:0;}

function dateSeed(dateStr){ return String(dateStr).split('').reduce((sum,ch)=>sum+ch.charCodeAt(0),0); }

function moonInfo(date=new Date()){
  const synodic = 29.530588853;
  const knownNewMoon = Date.UTC(2000,0,6,18,14);
  const now = Date.UTC(date.getFullYear(), date.getMonth(), date.getDate(), 12, 0);
  const age = (((now - knownNewMoon) / 86400000) % synodic + synodic) % synodic;
  const indexed = MOON_PHASES.map((p,i)=>({p,i,diff:Math.min(Math.abs(age-p.at), synodic-Math.abs(age-p.at))})).sort((a,b)=>a.diff-b.diff)[0];
  const current = indexed.p;
  const next = MOON_PHASES[(indexed.i + 1) % MOON_PHASES.length];
  let daysToNext = next.at - age;
  if(daysToNext <= 0) daysToNext += synodic;
  return {current, next, nextDate:addDaysToDate(date, Math.round(daysToNext))};
}

      if(res && res.value) return JSON.parse(res.value);
    }
  }catch(e){ /* ainda não existe - primeira vez */ }

}

/* ---------- recorrência ---------- */
function rolloverRecurring(){
  const today = todayStr();
  state.tasks.forEach(t=>{
    if(t.recorrencia && t.status==='Feito' && t.data!==today){
      if(t.recorrencia.freq==='diaria'){
        t.data = today; t.status = 'A fazer'; t.completedAt = null;
      } else if(t.recorrencia.freq==='semanal'){
        t.data = nextWeekday(t.recorrencia.weekday); t.status = 'A fazer'; t.completedAt = null;
      }
    }
  });
}

/* ---------- lista de tarefas (compartilhada) ---------- */
function renderTaskList(tasks, returnProjectId=null){

}
function renderTaskRow(t, options=null){
  if(!options || typeof options!=='object') options = {};
  const returnProjectId = options.returnProjectId || null;
  const draggable = !!options.draggable;
  const children = state.tasks.filter(c=>c.parentId===t.id);
  const sub = children.length ? `<span class="task-date">${children.filter(c=>c.status==='Feito').length}/${children.length} sub.</span>` : '';
  const areaTag = t.area ? `<span class="tag tag-${AREA_COLOR[t.area]||'gray'}">${escapeHtml(t.area)}</span>` : '';
  const project = getTaskProject(t);
  const projectTag = project ? `<span class="tag tag-purple" title="Abrir projeto" onclick="event.stopPropagation();openProjectPortal('${project.id}')">${escapeHtml(project.nome)}</span>` : (isProject(t) ? '<span class="tag tag-purple">Projeto</span>' : '');
  const dragAttrs = draggable ? ` draggable="true" ondragstart="startTaskDrag(event,'${t.id}')" ondragover="allowTaskDrop(event)" ondragleave="clearDragOver(event)" ondrop="dropTaskOnSibling(event,'${t.id}','${returnProjectId}')" ondragend="endTaskDrag(event)"` : '';
  return `<div class="task-row ${t.status==='Feito'?'done':''} ${draggable?'drag-enabled':''}"${dragAttrs} onclick="if(ignoreDragClick()) return; openTaskModal('${t.id}'${returnProjectId ? `,{returnToProjectId:'${returnProjectId}'}` : ''})">
    ${draggable ? '<span class="drag-handle" title="Arrastar para reorganizar">⋮⋮</span>' : ''}
    <span class="chk ${t.status==='Feito'?'checked':''}" onclick="event.stopPropagation();toggleTaskDone('${t.id}')">${t.status==='Feito'?'✓':''}</span>
    <span class="dot ${priorityClass(t.prioridade)}"></span>
    <span class="task-name">${escapeHtml(t.nome)}</span>
    ${projectTag}
    ${areaTag}
    ${sub}
    <span class="task-date">${formatDate(t.data)}</span>
  </div>`;
}
function startTaskDrag(event, id){
  draggedTaskId = id;
  dragClickGuard = true;
  event.stopPropagation();
  if(event.dataTransfer){
    event.dataTransfer.effectAllowed = 'move';
    event.dataTransfer.setData('text/plain', id);
  }
}
function allowTaskDrop(event){
  event.preventDefault();
  event.stopPropagation();
  event.currentTarget.classList.add('drag-over');
}
function clearDragOver(event){
  event.currentTarget.classList.remove('drag-over');
}
function endTaskDrag(event){
  event.currentTarget.classList.remove('drag-over');
  setTimeout(()=>{ dragClickGuard = false; draggedTaskId = null; }, 0);
}
function ignoreDragClick(){
  if(!dragClickGuard) return false;
  dragClickGuard = false;
  return true;
}
function dropTaskOnSibling(event, targetId, parentId){
  event.preventDefault();
  event.stopPropagation();
  event.currentTarget.classList.remove('drag-over');
  const sourceId = (event.dataTransfer && event.dataTransfer.getData('text/plain')) || draggedTaskId;
  if(!sourceId || sourceId===targetId) return;
  const parentProject = getProjectById(parentId);
  if(parentProject) parentProject.sortTasksByDueDate = false;
  reorderSiblingTasks(parentId || null, sourceId, targetId);
  saveState();
  render({preserveScroll:true});
  renderModal({preserveScroll:true});
}
function dropTaskOnStatus(event, status, area=''){
  event.preventDefault();
  event.stopPropagation();
  event.currentTarget.classList.remove('drag-over');
  const taskId = (event.dataTransfer && event.dataTransfer.getData('text/plain')) || draggedTaskId;
  const task = state.tasks.find(t=>t.id===taskId);
  if(!task || isProject(task)) return;
  if(area && task.area !== area) return;
  task.status = status;
  task.completedAt = status === 'Feito' ? Date.now() : null;
  saveState();
  if(modalState && modalState.id === task.id) modalState.draft.status = status;
  render({preserveScroll:true});
  renderModal({preserveScroll:true});
}
function reorderSiblingTasks(parentId, sourceId, targetId){
  const sameParent = t => (t.parentId || null) === (parentId || null);
  const siblings = state.tasks.filter(sameParent);
  if(!siblings.some(t=>t.id===sourceId) || !siblings.some(t=>t.id===targetId)) return;
  const reordered = siblings.filter(t=>t.id!==sourceId);
  const source = siblings.find(t=>t.id===sourceId);
  const targetIndex = reordered.findIndex(t=>t.id===targetId);
  reordered.splice(targetIndex, 0, source);
  const siblingIds = new Set(siblings.map(t=>t.id));
  let inserted = false;
  state.tasks = state.tasks.reduce((acc, task)=>{
    if(siblingIds.has(task.id)){
      if(!inserted){
        acc.push(...reordered);
        inserted = true;
      }
      return acc;
    }
    acc.push(task);
    return acc;
  }, []);
}
function toggleTaskDone(id){
  const t = state.tasks.find(x=>x.id===id);
  if(!t) return;
  if(t.status==='Feito'){ t.status='A fazer'; }
  else { t.status='Feito'; t.completedAt=Date.now(); }
  saveState();
  render({preserveScroll:true});
  if(modalState && modalState.id===id){ modalState.draft.status=t.status; }
  renderModal({preserveScroll:true});
}
function openProjectPortal(id){
  ui.page = 'projetos';
  ui.scrollTop = 0;
  saveUiPrefs(0);
  render({scrollTop:0});
  openTaskModal(id);
}

/* ---------- Projetos ---------- */
function renderProjetos(){
  ensureProjectFields();
  const projects = sortProjectsByDue(getProjects());
  const active = projects.filter(p=>!['Pausado','Concluído'].includes(p.projectStatus));
  const paused = projects.filter(p=>p.projectStatus==='Pausado');
  const done = projects.filter(p=>p.projectStatus==='Concluído');
  const soon = projects.filter(p=>{
    const days = daysUntil(p.data);
    return p.projectStatus!=='Concluído' && days!==null && days>=0 && days<=7;
  });
  const pendingTasks = projects.reduce((sum,p)=>sum+projectOpenTasks(p.id).length,0);
  const noNext = projects.filter(p=>p.projectStatus!=='Concluído' && !projectNextAction(p));
  const nextProject = active[0];
  const tab = ui.projetosTab || 'ativos';
  let visible = active;
  if(tab==='area') visible = projects;
  if(tab==='prazo') visible = soon;
  if(tab==='pausados') visible = paused;
  if(tab==='concluidos') visible = done;
  if(tab==='semacao') visible = noNext;

  return `
    <section class="projects-page">
      <header class="projects-header">
        <div>
          <div class="projects-kicker">✦ Painel ritual</div>
          <h1 class="projects-title"><span class="page-emoji">${pageEmoji('projetos')}</span> Projetos</h1>
          <p class="projects-subtitle">Tudo que está em movimento, sem virar bagunça.</p>
          <button class="btn" style="margin-top:16px" onclick="openNewProjectModal()">+ Novo projeto</button>
        </div>
        <div class="projects-overview">
          ${renderProjectStat(active.length,'Projetos ativos')}
          ${renderProjectStat(paused.length,'Projetos pausados')}
          ${renderProjectStat(soon.length,'Prazo próximo')}
          ${renderProjectStat(pendingTasks,'Tarefas pendentes')}
        </div>
      </header>

      <div class="project-focus-strip">
        <div class="project-focus-box">
          <div class="project-ritual-title"><span class="project-ritual-icon">◉</span><span>Ritual rápido de revisão</span></div>
        </div>
        <div class="project-focus-box">
          <div class="project-focus-label">O que pede ação agora</div>
          <div class="project-focus-text">${nextProject ? `${escapeHtml(nextProject.nome)}: ${escapeHtml(projectNextAction(nextProject)||'definir próxima ação')}` : 'Nenhum projeto ativo pedindo ação.'}</div>
        </div>
        <div class="project-focus-box">
          <div class="project-focus-label">Para não esquecer</div>
          <div class="project-focus-text">${paused.length ? `${paused.length} projeto${paused.length>1?'s':''} pausado${paused.length>1?'s':''} esperando revisão.` : 'Nenhum projeto pausado agora.'}</div>
        </div>
      </div>

      <div class="project-tabs">
        ${renderProjectTab('ativos','Ativos',tab)}
        ${renderProjectTab('area','Por área',tab)}
        ${renderProjectTab('prazo','Prazo próximo',tab)}
        ${renderProjectTab('pausados','Pausados',tab)}
        ${renderProjectTab('concluidos','Concluídos',tab)}
        ${renderProjectTab('semacao','Sem próxima ação',tab)}
      </div>

      ${tab==='area' ? renderProjectsByArea(visible) : renderProjectGallery(visible)}
    </section>
  `;
}
function sortProjectsByDue(projects){
  return projects.slice().sort((a,b)=>{
    const ad = daysUntil(a.data);
    const bd = daysUntil(b.data);
    if(ad === null && bd === null) return (a.nome||'').localeCompare(b.nome||'');
    if(ad === null) return 1;
    if(bd === null) return -1;
    return ad - bd;
  });
}
function renderProjectStat(num,label){
  const icons = {'Projetos ativos':'✧','Projetos pausados':'☾','Prazo próximo':'◌','Tarefas pendentes':'✦'};
  return `<div class="project-stat"><div class="project-stat-icon">${icons[label]||'✦'}</div><div class="project-stat-num">${num}</div><div class="project-stat-label">${label}</div></div>`;
}
function renderProjectTab(key,label,tab){
  return `<button class="project-tab ${tab===key?'active':''}" onclick="setProjetosTab('${key}')">${label}</button>`;
}
function renderProjectGallery(projects){
  if(!projects.length) return '<div class="project-empty">Nada nesta visão. Respira: aqui não tem pendência gritando.</div>';
  return `<div class="project-gallery">${projects.map(renderProjectCard).join('')}</div>`;

function reviewChecked(key){

  return !!(state.revisaoLog && state.revisaoLog[date] && state.revisaoLog[date][key]);

function toggleReviewCheck(key){
  const date = todayStr();
  if(!state.revisaoLog) state.revisaoLog = {};
  if(!state.revisaoLog[date]) state.revisaoLog[date] = {};
  state.revisaoLog[date][key] = !state.revisaoLog[date][key];
  saveState();
  render({preserveScroll:true});
}
function renderReviewCheck(key, text, sub=''){

}

function renderEditorialCalendar(tasks){
  const now = editorialCalendarDate();
  const year = now.getFullYear();
  const month = now.getMonth();
  const first = new Date(year, month, 1);
  const start = new Date(first);
  start.setDate(first.getDate() - first.getDay());
  const heads = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].map(d=>`<div class="editorial-calendar-head">${d}</div>`).join('');
  const cells = [];
  const today = todayStr();
  for(let i=0;i<42;i++){
    const d = new Date(start);
    d.setDate(start.getDate()+i);
    const dateStr = fmt(d);
    const dayTasks = tasks.filter(t=>t.data===dateStr && editorialStageForTask(t)!=='demanda').sort(byDueDate);
    cells.push(`<div class="editorial-day ${d.getMonth()!==month?'muted':''} ${dateStr===today?'today':''}">
      <div class="editorial-day-num"><span>${d.getDate()}</span><span>${dateStr===today ? '<span class="editorial-today-pill">Hoje</span>' : (dayTasks.length || '')}</span></div>

function duplicateEditorialTask(id){
  const original = state.tasks.find(t=>t.id===id);
  if(!original) return;
  const copy = Object.assign({}, original, {
    id: genId(),
    nome: `${original.nome || 'Entrega'} (cópia)`,
    completedAt: null
  });
  state.tasks.push(copy);

function dropEditorialTaskOnStage(event, stage){
  event.preventDefault();
  event.stopPropagation();
  event.currentTarget.classList.remove('drag-over');
  const taskId = (event.dataTransfer && event.dataTransfer.getData('text/plain')) || draggedTaskId;
  const task = state.tasks.find(t=>t.id===taskId);
  if(!task || task.area!=='Marketing Personnallité' || isProject(task)) return;
  task.editorialStage = stage;
  task.status = editorialStatusForStage(stage);
  task.completedAt = stage === 'postado' ? Date.now() : null;
  if(!task.channel) task.channel = 'Instagram';
  saveState();
  render({preserveScroll:true});

function togglePubliqueRoutine(type, id){
  ensurePubliqueRoutine();
  const routine = state.publiqueRoutine;
  const key = type === 'weekly' ? weekKey() : todayStr();
  const bucketName = type === 'weekly' ? 'weeklyLog' : 'dailyLog';
  if(!routine[bucketName][key]) routine[bucketName][key] = {};
  routine[bucketName][key][id] = !routine[bucketName][key][id];
  saveState();
  render({preserveScroll:true});
}
function addPubliqueRoutineItem(type){
  ensurePubliqueRoutine();
  const input = document.getElementById(type === 'weekly' ? 'newPubliqueWeekly' : 'newPubliqueDaily');

  if(!nome) return;
  const listName = type === 'weekly' ? 'weeklyItems' : 'dailyFields';
  state.publiqueRoutine[listName].push({id:genId(), nome, notes:''});
  saveState();
  render({preserveScroll:true});

function deletePubliqueRoutineItem(type, id){
  ensurePubliqueRoutine();
  const listName = type === 'weekly' ? 'weeklyItems' : 'dailyFields';
  state.publiqueRoutine[listName] = state.publiqueRoutine[listName].filter(item=>item.id!==id);
  const logName = type === 'weekly' ? 'weeklyLog' : 'dailyLog';
  Object.keys(state.publiqueRoutine[logName]).forEach(key=>{ delete state.publiqueRoutine[logName][key][id]; });
  saveState();
  render({preserveScroll:true});
}

function inferLendoType(t){
  const text = `${t.nome||''} ${t.notas||''}`.toLowerCase();
  if(text.includes('stories')) return 'Stories';
  if(text.includes('reels') || text.includes('vídeo') || text.includes('video')) return 'Reels';
  if(text.includes('parceria') || text.includes('autora') || text.includes('editora')) return 'Parcerias';
  if(text.includes('thread') || text.includes('post')) return 'Conteúdo X';
  if(text.includes('comunidade')) return 'Comunidade';
  return 'Instagram';
}
function lendoTypeTagClass(type){
  if(type==='Stories') return 'tag-orange';
  if(type==='Reels' || type==='Instagram') return 'tag-pink';
  if(type==='Parcerias' || type==='Conteúdo X') return 'tag-purple';
  if(type==='Comunidade') return 'tag-green';
  return 'tag-gray';
}

function isLendoVideoTask(t){

function addLendoVideo(stage='ideia'){
  const titleInput = document.getElementById('newVideoTitle');

  const nome = (titleInput?.value || '').trim() || 'Novo vídeo';
  const data = dateInput?.value || '';
  state.tasks.push({id:genId(), nome, area:'Lendo Sáficos', tipo:'Tarefa única', status:videoStatusForStage(stage), data, prioridade:'Normal', notas:'', link:'', parentId:null, recorrencia:null, completedAt:null, energia:'Média', tempoEstimado:'', isConteudo:true, isVideo:true, videoStage:stage});
  saveState();
  render({preserveScroll:true});
}
function dropLendoVideoOnStage(event, stage){
  event.preventDefault();
  event.stopPropagation();
  event.currentTarget.classList.remove('drag-over');
  const taskId = (event.dataTransfer && event.dataTransfer.getData('text/plain')) || draggedTaskId;
  const task = state.tasks.find(t=>t.id===taskId);
  if(!task || task.area!=='Lendo Sáficos' || isProject(task)) return;
  task.isVideo = true;
  task.isConteudo = true;
  task.videoStage = stage;
  if(task.status!=='Feito') task.status = videoStatusForStage(stage);
  saveState();
  render({preserveScroll:true});
}
function markVideoPublished(id){
  const task = state.tasks.find(t=>t.id===id);
  if(!task) return;
  task.isVideo = true;
  task.isConteudo = true;
  task.videoStage = 'publicacao';
  task.status = 'Feito';
  task.completedAt = Date.now();
  saveState();
  render({preserveScroll:true});
}

function lendoTropeGroups(books){
  return books.reduce((groups, book)=>{
    const usedInBook = new Set();
    (book.tropes || []).forEach(t=>{
      const trope = normalizeLendoTrope(t);
      if(!trope || usedInBook.has(trope)) return;
      usedInBook.add(trope);
      if(!groups[trope]) groups[trope] = [];
      groups[trope].push(book);
    });
    return groups;
  }, {});
}

  return (book.tropes || []).map(formatLendoTrope).filter(Boolean).join(', ');

function renderFinanceiro(){

  const recebidoMes = monthRows.reduce((s,v)=>s+vendaValorRecebido(v),0);

function addLendoBook(){
  const titulo = document.getElementById('bookTitle')?.value.trim();
  const autora = document.getElementById('bookAuthor')?.value.trim();
  const link = document.getElementById('bookLink')?.value.trim();
  const tropesRaw = document.getElementById('bookTropes')?.value.trim();
  if(!titulo || !autora){ alert('Preencha pelo menos nome do livro e autora.'); return; }
  if(!state.lendoBooks) state.lendoBooks = [];
  const seenTropes = new Set();
  const tropes = (tropesRaw||'').split(',').map(normalizeLendoTrope).filter(trope=>{
    if(!trope || seenTropes.has(trope)) return false;
    seenTropes.add(trope);
    return true;
  });
  state.lendoBooks.push({id:genId(), titulo, autora, link:link||'', tropes});
  saveState();
  render({preserveScroll:true});
}
function deleteLendoBook(id){
  state.lendoBooks = (state.lendoBooks || []).filter(b=>b.id!==id);
  saveState();
  render({preserveScroll:true});
}
function generateLendoList(){
  const trope = document.getElementById('generateTrope')?.value.trim();
  if(!trope){ alert('Digite um trope para gerar a lista.'); return; }
  const qty = Number(prompt('Quantos livros você quer nessa lista?'));
  if(!qty || qty < 1) return;
  const normalized = normalizeLendoTrope(trope);
  const seen = new Set();
  const matches = (state.lendoBooks || []).filter(b=>{
    const key = `${(b.titulo||'').toLowerCase()}|${(b.autora||'').toLowerCase()}`;
    if(seen.has(key)) return false;
    const ok = (b.tropes||[]).some(t=>normalizeLendoTrope(t).includes(normalized));
    if(ok) seen.add(key);
    return ok;
  });
  const recentIds = new Set((state.lendoGenerationMemory || []).flat());
  const fresh = shuffleList(matches.filter(b=>!recentIds.has(b.id)));
  const recent = shuffleList(matches.filter(b=>recentIds.has(b.id)));
  const selected = fresh.slice(0, qty);
  if(selected.length < qty && recent.length){
    selected.push(recent[0]);
  }
  lendoCurrentGeneratedList = selected;
  if(!state.lendoGeneratedHistory) state.lendoGeneratedHistory = [];
  if(!state.lendoGenerationMemory) state.lendoGenerationMemory = [];
  state.lendoGeneratedHistory.unshift({
    id: genId(),
    trope,
    date: new Date().toLocaleDateString('pt-BR'),
    books: selected.map(b=>({titulo:b.titulo, autora:b.autora, link:b.link, tropes:b.tropes || []}))
  });
  state.lendoGeneratedHistory = state.lendoGeneratedHistory.slice(0, 30);
  state.lendoGenerationMemory.unshift(selected.map(b=>b.id));
  state.lendoGenerationMemory = state.lendoGenerationMemory.slice(0, 5);
  saveState();
  render({preserveScroll:true});
  if(selected.length < qty) alert(`Consegui montar ${selected.length} livro(s) sem passar do limite de repetição das últimas 5 listas.`);
}

function saveModalTask(){
  const d = modalState.draft;
  const returnToProjectId = modalState.returnToProjectId;
  if(!d.nome || !d.nome.trim()){ alert('Dá um nome pra essa tarefa antes de salvar.'); return; }
  if(d.tipo==='Projeto'){
    d.parentId = null;
    d.projectStatus = d.projectStatus || projectStatusFromTaskStatus(d.status);
    d.projectPriority = d.projectPriority || priorityToProjectPriority(d.prioridade);
    d.energia = d.energia || 'Média';
    d.dataFim = d.dataFim || d.data || '';
    d.data = d.dataFim || d.data;
  } else if(d.area==='Marketing Personnallité'){
    d.editorialStage = d.editorialStage || editorialStageForTask(d);
    d.channel = d.channel || 'Instagram';
    d.status = editorialStatusForStage(d.editorialStage);
  }
  if(modalState.id){
    const idx = state.tasks.findIndex(t=>t.id===modalState.id);
    state.tasks[idx] = Object.assign({}, state.tasks[idx], d);
  } else {
    state.tasks.push(Object.assign({id:genId(), parentId:null, recorrencia:null, completedAt:null}, d));
  }
  saveState();
  render({preserveScroll:true});
  if(returnToProjectId && state.tasks.some(t=>t.id===returnToProjectId)){
    openTaskModal(returnToProjectId);
  } else {
    closeModal();
  }
}

  if(!confirm('Excluir esta tarefa e suas subtarefas?')) return;
  state.tasks = state.tasks.filter(t=>t.id!==id && t.parentId!==id);
  saveState();
  closeModal();

}
function completeAndRepeat(id){
  const idx = state.tasks.findIndex(t=>t.id===id);
  if(idx<0) return;
  const t = state.tasks[idx];
  t.status='Feito'; t.completedAt=Date.now();
  const novo = Object.assign({}, t, {id:genId(), status:'A fazer', data:todayStr(), completedAt:null});
  state.tasks.push(novo);
  saveState();
  closeModal();
  render({preserveScroll:true});
}
function updateFocus(txt){ state.focus = txt; saveState(); }

/* ---------- H\u00e1bitos ---------- */
function habitMonthProgress(year, month){
  const habits = state.habitos || [];
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const total = habits.length * daysInMonth;
  if(!total) return 0;
  let done = 0;
  for(let day=1; day<=daysInMonth; day++){
    const dateStr = fmt(new Date(year, month, day));
    const log = (state.habitosLog && state.habitosLog[dateStr]) || [];
    done += habits.filter(h=>log.includes(h.id)).length;
  }
  return Math.round(done / total * 100);
}
function renderHabitos(){
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const habits = state.habitos || [];
  const monthNames = Array.from({length:12},(_,i)=>new Date(year,i,1).toLocaleDateString('pt-BR',{month:'short'}).replace('.',''));
  const yearCards = monthNames.map((name,i)=>{
    const progress = habitMonthProgress(year, i);
    return `<div class="habit-month-card">
      <div class="habit-month-name">${escapeHtml(name)}</div>
      <div class="habit-month-score">${progress}%</div>
      <div class="habit-month-bar"><div class="habit-month-fill" style="width:${progress}%"></div></div>
    </div>`;
  }).join('');
  const headDays = Array.from({length:daysInMonth},(_,i)=>`<th>${i+1}</th>`).join('');
  const rows = habits.map(h=>{
    const cells = Array.from({length:daysInMonth},(_,i)=>{
      const dateStr = fmt(new Date(year, month, i+1));
      const done = state.habitosLog && state.habitosLog[dateStr] && state.habitosLog[dateStr].includes(h.id);
      return `<td><span class="habit-day-cell ${done?'done':''}" onclick="toggleHabit('${h.id}','${dateStr}')">${done?'✓':''}</span></td>`;
    }).join('');
    return `<tr>
      <td><div class="habit-name-cell"><span>${escapeHtml(h.icone||'✦')}</span><span>${escapeHtml(h.nome)}</span><button class="icon-btn" style="margin-left:auto" onclick="deleteHabit('${h.id}')">✕</button></div></td>
      ${cells}
    </tr>`;
  }).join('');
  const currentProgress = habitMonthProgress(year, month);
  return `<section class="habits-page">
    <header class="habits-header">
      <div>
        <div class="projects-kicker">✦ Ritmo e presença</div>
        <h1 class="projects-title"><span class="page-emoji">${pageEmoji('habitos')}</span> Hábitos</h1>
        <p class="habits-subtitle">Uma visão clara dos meses, sem cobrança infinita.</p>
      </div>
      <div class="project-stat" style="min-width:170px">
        <div class="project-stat-num">${currentProgress}%</div>
        <div class="project-stat-label">Progresso deste mês</div>
      </div>
    </header>
    <div class="habit-actions">
      <button class="btn btn-primary" onclick="promptNewHabit()">+ Novo hábito</button>
    </div>
    <div class="habits-year-grid">${yearCards}</div>
    <div class="habit-control-card">
      <div class="section-label-hoje" style="margin-bottom:14px">${now.toLocaleDateString('pt-BR',{month:'long',year:'numeric'})}</div>
      ${habits.length ? `<table class="habit-table"><thead><tr><th>Hábito</th>${headDays}</tr></thead><tbody>${rows}</tbody></table>` : '<div class="empty">Nenhum hábito cadastrado ainda.</div>'}
    </div>
  </section>`;
}
function toggleHabit(id, dateStr){
  if(!state.habitosLog) state.habitosLog = {};
  if(!state.habitosLog[dateStr]) state.habitosLog[dateStr] = [];
  const log = state.habitosLog[dateStr];
  const idx = log.indexOf(id);
  if(idx >= 0) log.splice(idx, 1); else log.push(id);
  saveState();
  render({preserveScroll:true});
}
function promptNewHabit(){
  const nome = prompt('Nome do novo h\u00e1bito (ex: Meditar 10 min):');
  if(!nome || !nome.trim()) return;
  const icone = prompt('Emoji do h\u00e1bito:', '\u2728') || '\u2728';
  if(!state.habitos) state.habitos = [];
  state.habitos.push({ id: genId(), nome: nome.trim(), icone });
  saveState();
  render({preserveScroll:true});
}
function deleteHabit(id){
  if(!confirm('Excluir este hábito? O histórico dele será removido.')) return;
  state.habitos = (state.habitos || []).filter(h=>h.id!==id);
  if(state.habitosLog){
    Object.keys(state.habitosLog).forEach(dateStr=>{
      state.habitosLog[dateStr] = state.habitosLog[dateStr].filter(hid=>hid!==id);
    });
  }
  saveState();
  render({preserveScroll:true});
}

/* ---------- modal de venda ---------- */
function openVendaModal(id){
  const v = state.vendas.find(x=>x.id===id);
  if(!v) return;
  modalState = { type:'venda', id, draft:Object.assign({formaPagamento:'100'}, v, {itens:[...(v.itens||[])]}) };
  renderModal();
}
function openNewVendaModal(){
  modalState = { type:'venda', id:null, draft:{ autora:'', tipoParceria:'Divulgação avulsa', itens:[], valor:0, formaPagamento:'100', statusPagamento:'A receber', statusEntrega:'A fazer', data:'', notas:'' } };
  renderModal();
}
function renderVendaModal(){
  const d = modalState.draft;
  const isNew = !modalState.id;
  const itensOptions = vendaItensOptions(d.tipoParceria);
  return `<div class="modal-overlay" onclick="if(event.target===this) closeModal()">
    <div class="modal">
      <div class="modal-header"><h2>${isNew?'Nova venda':'Editar venda'}</h2><button class="icon-btn" onclick="closeModal()">✕</button></div>
      <div class="field"><label>Autora / Editora</label><input type="text" value="${escapeAttr(d.autora)}" oninput="modalState.draft.autora=this.value"></div>
      <div class="field"><label>Tipo de parceria</label><select onchange="modalState.draft.tipoParceria=this.value; modalState.draft.itens=[]; renderModal({preserveScroll:true});">
        ${['Divulgação avulsa','Pacote mídia kit','Parceria com editora'].map(o=>`<option ${d.tipoParceria===o?'selected':''}>${o}</option>`).join('')}
      </select></div>
      <div class="field"><label>O que foi vendido</label>
        <div class="multiselect">${itensOptions.map(i=>`<div class="chip ${(d.itens||[]).includes(i)?'sel':''}" onclick="toggleVendaItem('${i}')">${i}</div>`).join('')}</div>
      </div>
      <div class="field-row">
        <div class="field"><label>Valor (R$)</label><input type="number" value="${d.valor}" oninput="modalState.draft.valor=this.value"></div>
        <div class="field"><label>Data combinada</label><input type="date" value="${d.data||''}" onchange="modalState.draft.data=this.value"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Pagamento</label><select onchange="modalState.draft.statusPagamento=this.value">
          ${['A receber','Recebido'].map(o=>`<option ${d.statusPagamento===o?'selected':''}>${o}</option>`).join('')}
        </select></div>
        <div class="field"><label>Forma de pagamento</label><select onchange="modalState.draft.formaPagamento=this.value">
          <option value="100" ${(d.formaPagamento||'100')==='100'?'selected':''}>100%</option>
          <option value="50_entrega" ${d.formaPagamento==='50_entrega'?'selected':''}>50% agora + restante na entrega</option>
        </select></div>
        <div class="field"><label>Entrega</label><select onchange="modalState.draft.statusEntrega=this.value">
          ${STATUS_ENTREGA.map(o=>`<option ${d.statusEntrega===o?'selected':''}>${o}</option>`).join('')}
        </select></div>
      </div>
      <div class="field"><label>Notas</label><textarea oninput="modalState.draft.notas=this.value">${escapeHtml(d.notas||'')}</textarea></div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="saveModalVenda()">Salvar</button>
        ${!isNew ? `<button class="btn btn-danger" onclick="deleteVenda('${modalState.id}')">Excluir</button>` : ''}
        <button class="btn" onclick="closeModal()">Cancelar</button>
      </div>
    </div>
  </div>`;
}
function toggleVendaItem(i){
  const arr = modalState.draft.itens || (modalState.draft.itens = []);
  const idx = arr.indexOf(i);
  if(idx>=0) arr.splice(idx,1); else arr.push(i);
  renderModal();
}
function saveModalVenda(){
  const d = modalState.draft;
  if(!d.autora || !d.autora.trim()){ alert('Adicione o nome da autora ou editora antes de salvar.'); return; }
  if(modalState.id){
    const idx = state.vendas.findIndex(v=>v.id===modalState.id);
    state.vendas[idx] = Object.assign({}, state.vendas[idx], d);
  } else {
    state.vendas.push(Object.assign({id:genId()}, d));
  }
  saveState();
  closeModal();
  render({preserveScroll:true});
}
function deleteVenda(id){
  if(!confirm('Excluir esta venda?')) return;
  state.vendas = state.vendas.filter(v=>v.id!==id);
  saveState();
  closeModal();
  render({preserveScroll:true});
}
function scheduleMidnightRefresh(){
  clearTimeout(midnightTimer);
  const now = new Date();
  const next = new Date(now);
  next.setDate(next.getDate() + 1);
  next.setHours(0,0,1,0);
  midnightTimer = setTimeout(()=>{
    render({preserveScroll:true});
    scheduleMidnightRefresh();
  }, Math.max(1000, next - now));
}

/* ---------- inicialização ---------- */
async function init(){
  const prefs = await loadThemePrefs();
  if(prefs) themePrefs = prefs;
  applyTheme();
  
  const saved = await loadState();
  if(saved){
    state = saved;
    if(!state.covers) state.covers = {};
    if(!state.habitos) state.habitos = [];
    if(!state.habitosLog) state.habitosLog = {};
    ensurePageEmojis();
    ensureProjectFields();
    rolloverRecurring();
    saveState();
  } else {
    state = seedState();
    ensurePageEmojis();
    ensureProjectFields();
  }

  const savedUi = loadUiPrefs();
  if(savedUi){
    ui = Object.assign({}, ui, savedUi);
  }
  
  const sn = document.getElementById('storage-note');
  if(window.storage) sn.innerText = 'Sincronizado na nuvem';
  else sn.innerText = 'Salvo no navegador';
  
  render({scrollTop:ui.scrollTop || 0});
  const content = document.getElementById('content');
  if(content) content.addEventListener('scroll', scheduleSaveUiPrefs, {passive:true});
  window.addEventListener('beforeunload', saveUiPrefs);
  scheduleMidnightRefresh();
}
init();
</script>
</body>
</html>
